# Baseline experiment: Custom U-Net on merged dataset
# Matches original notebook training setup
data: data/merged
model: model/unet_resnet34

data_overrides:
  batch_size: 1  # matches notebook

training:
  max_epochs: 100
  device: auto
  mixed_precision: false
  monitor: val_loss
  monitor_mode: min
  patience: 100
  min_delta: 0.0

optimizer:
  type: adam
  lr: 0.00005
  weight_decay: 0.0

scheduler: null

loss:
  type: ce
  class_weights: [1.0, 1.0, 1.5, 1.0, 1.5, 1.5]
