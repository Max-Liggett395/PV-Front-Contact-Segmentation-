# AR Phase 2 — Exp 12: SMP UNet with ResNet50 encoder (imagenet pretrained)
# Baseline: DeepLabV3+ merged mIoU 0.781
# Change: SMP UNet + ResNet50 encoder + imagenet pretrained weights
# (simpler than UNet++ but pretrained encoder should help on tiny 130-image dataset)
data: data/merged
model: model/smp_unet_resnet50

data_overrides:
  batch_size: 2

training:
  max_epochs: 200
  device: auto
  mixed_precision: false
  monitor: val_loss
  monitor_mode: min
  patience: 50
  min_delta: 0.0

optimizer:
  type: adam
  lr: 0.00005
  weight_decay: 0.0

scheduler: null

loss:
  type: ce
  class_weights: [1.0, 1.0, 1.5, 1.0, 1.5, 1.5]
