# AR Phase 1 — Exp 04: Cosine annealing LR scheduler
# Baseline: DeepLabV3+ merged mIoU 0.781
# Change: Add cosine annealing scheduler with lr=1e-4
data: data/merged
model: model/deeplabv3plus_resnet101

data_overrides:
  batch_size: 2

training:
  max_epochs: 200
  device: auto
  mixed_precision: false
  monitor: val_loss
  monitor_mode: min
  patience: 50
  min_delta: 0.0

optimizer:
  type: adam
  lr: 0.0001
  weight_decay: 0.0

scheduler:
  type: cosine_annealing
  T_max: 200

loss:
  type: ce
  class_weights: [1.0, 1.0, 1.5, 1.0, 1.5, 1.5]
