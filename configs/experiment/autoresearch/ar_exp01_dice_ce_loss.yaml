# AR Phase 1 — Exp 01: Combined Dice + CE loss
# Baseline: DeepLabV3+ merged mIoU 0.781
# Change: Switch from pure CE to Dice+CE (dice_weight=0.5, ce_weight=0.5)
data: data/merged
model: model/deeplabv3plus_resnet101

data_overrides:
  batch_size: 2

training:
  max_epochs: 200
  device: auto
  mixed_precision: false
  monitor: val_loss
  monitor_mode: min
  patience: 50
  min_delta: 0.0

optimizer:
  type: adam
  lr: 0.00005
  weight_decay: 0.0

scheduler: null

loss:
  type: dice_ce
  dice_weight: 0.5
  ce_weight: 0.5
  class_weights: [1.0, 1.0, 1.5, 1.0, 1.5, 1.5]
