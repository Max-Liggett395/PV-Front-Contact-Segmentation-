# AR Phase 1 — Exp 08: UNet++ with EfficientNet-B4 backbone (segmentation_models_pytorch)
# Baseline: DeepLabV3+ merged mIoU 0.781
# Change: Replace architecture with smp UNet++ + EfficientNet-B4 encoder
data: data/merged
model: model/smp_unetpp_effb4

data_overrides:
  batch_size: 2

training:
  max_epochs: 200
  device: auto
  mixed_precision: false
  monitor: val_loss
  monitor_mode: min
  patience: 50
  min_delta: 0.0

optimizer:
  type: adam
  lr: 0.00005
  weight_decay: 0.0

scheduler: null

loss:
  type: ce
  class_weights: [1.0, 1.0, 1.5, 1.0, 1.5, 1.5]
