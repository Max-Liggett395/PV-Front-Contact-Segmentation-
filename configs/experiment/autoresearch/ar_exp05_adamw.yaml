# AR Phase 1 — Exp 05: AdamW optimizer with weight decay
# Baseline: DeepLabV3+ merged mIoU 0.781
# Change: Switch from Adam to AdamW with weight_decay=0.01
data: data/merged
model: model/deeplabv3plus_resnet101

data_overrides:
  batch_size: 2

training:
  max_epochs: 200
  device: auto
  mixed_precision: false
  monitor: val_loss
  monitor_mode: min
  patience: 50
  min_delta: 0.0

optimizer:
  type: adamw
  lr: 0.00005
  weight_decay: 0.01

scheduler: null

loss:
  type: ce
  class_weights: [1.0, 1.0, 1.5, 1.0, 1.5, 1.5]
