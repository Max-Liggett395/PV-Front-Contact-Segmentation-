# AR Phase 1 — Exp 03: Strong augmentation preset
# Baseline: DeepLabV3+ merged mIoU 0.781
# Change: Enable strong augmentation preset via augmentation_preset flag
data: data/merged
model: model/deeplabv3plus_resnet101

data_overrides:
  batch_size: 2
  augmentation_preset: strong

training:
  max_epochs: 200
  device: auto
  mixed_precision: false
  monitor: val_loss
  monitor_mode: min
  patience: 50
  min_delta: 0.0

optimizer:
  type: adam
  lr: 0.00005
  weight_decay: 0.0

scheduler: null

loss:
  type: ce
  class_weights: [1.0, 1.0, 1.5, 1.0, 1.5, 1.5]
