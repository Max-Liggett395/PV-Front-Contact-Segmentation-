# AR Phase 3 — Exp 18: Pretrained DeepLabV3+ RN101 + cosine + Dice+CE + batch_size=4 + AMP
# Baseline: DeepLabV3+ merged mIoU 0.781
# Change: imagenet pretrained + cosine lr=1e-4 + Dice+CE loss + batch_size=4 + mixed_precision=true
data: data/merged
model: model/deeplabv3plus_resnet101_pretrained

data_overrides:
  batch_size: 4

training:
  max_epochs: 1000
  device: auto
  mixed_precision: true
  monitor: val_loss
  monitor_mode: min
  patience: 200
  min_delta: 0.0

optimizer:
  type: adam
  lr: 0.0001
  weight_decay: 0.0

scheduler:
  type: cosine_annealing
  T_max: 1000

loss:
  type: dice_ce
  dice_weight: 0.5
  ce_weight: 0.5
  class_weights: [1.0, 1.0, 1.5, 1.0, 1.5, 1.5]
