# AR Phase 2 — Exp 10: OneCycleLR with aggressive max_lr
# Baseline: DeepLabV3+ merged mIoU 0.781
# Change: OneCycleLR scheduler with max_lr=1e-3 (warm-up + annealing in one cycle)
data: data/merged
model: model/deeplabv3plus_resnet101

data_overrides:
  batch_size: 2

training:
  max_epochs: 200
  device: auto
  mixed_precision: false
  monitor: val_loss
  monitor_mode: min
  patience: 50
  min_delta: 0.0

optimizer:
  type: adam
  lr: 0.001
  weight_decay: 0.0

scheduler:
  type: one_cycle
  max_lr: 0.001
  total_steps: 200  # matched to max_epochs (step per epoch)

loss:
  type: ce
  class_weights: [1.0, 1.0, 1.5, 1.0, 1.5, 1.5]
