# AR Phase 3 — Exp 19: SMP DeepLabV3+ with EfficientNet-B7 encoder
# Baseline: DeepLabV3+ merged mIoU 0.781
# Change: SMP DeepLabV3+ + EfficientNet-B7 encoder + imagenet weights + batch_size=1 (large model)
data: data/merged
model: model/smp_deeplabv3plus_effb7

data_overrides:
  batch_size: 1

training:
  max_epochs: 1000
  device: auto
  mixed_precision: false
  monitor: val_loss
  monitor_mode: min
  patience: 200
  min_delta: 0.0

optimizer:
  type: adam
  lr: 0.00005
  weight_decay: 0.0

scheduler: null

loss:
  type: ce
  class_weights: [1.0, 1.0, 1.5, 1.0, 1.5, 1.5]
