# AR Phase 2 — Exp 09: Higher base LR with cosine annealing
# Baseline: DeepLabV3+ merged mIoU 0.781
# Change: Cosine annealing with lr=3e-4 (exp04 used 1e-4 and was close; push higher)
data: data/merged
model: model/deeplabv3plus_resnet101

data_overrides:
  batch_size: 2

training:
  max_epochs: 200
  device: auto
  mixed_precision: false
  monitor: val_loss
  monitor_mode: min
  patience: 50
  min_delta: 0.0

optimizer:
  type: adam
  lr: 0.0003
  weight_decay: 0.0

scheduler:
  type: cosine_annealing
  T_max: 200

loss:
  type: ce
  class_weights: [1.0, 1.0, 1.5, 1.0, 1.5, 1.5]
