# AR Phase 2 — Exp 14: CE loss with label smoothing
# Baseline: DeepLabV3+ merged mIoU 0.781
# Change: label_smoothing=0.1 for regularization on tiny 130-image dataset
data: data/merged
model: model/deeplabv3plus_resnet101

data_overrides:
  batch_size: 2

training:
  max_epochs: 200
  device: auto
  mixed_precision: false
  monitor: val_loss
  monitor_mode: min
  patience: 50
  min_delta: 0.0

optimizer:
  type: adam
  lr: 0.00005
  weight_decay: 0.0

scheduler: null

loss:
  type: ce
  label_smoothing: 0.1
  class_weights: [1.0, 1.0, 1.5, 1.0, 1.5, 1.5]
